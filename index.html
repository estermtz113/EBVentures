<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xeta Music Label</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="wrap nav-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo-mark.svg" alt="Xeta logo" />
        <span class="brand-name">XETA</span>
      </a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden />
      <label class="nav-burger" for="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></label>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="releases.html">Releases</a></li>
        <li><a href="artist.html">Artist</a></li>
        <li><a href="videos.html">Videos</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <!-- BANNER (full-width, edge to edge) -->
  <section class="banner">
    <div class="banner-inner">
      <div class="banner-text">
        <h1>Xeta Music<br />Label</h1>
        <p class="artist">Waleed DJ</p>
        <div class="banner-cta">
          <a class="btn-stream btn-spotify" href="https://open.spotify.com" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.5 17.3c-.22.36-.68.47-1.04.25-2.86-1.74-6.46-2.14-10.7-1.17-.41.1-.82-.16-.92-.57-.1-.41.16-.82.57-.92 4.64-1.06 8.62-.6 11.84 1.36.36.22.47.68.25 1.05zm1.47-3.27c-.28.45-.87.6-1.32.32-3.28-2.02-8.28-2.6-12.16-1.42-.5.15-1.03-.13-1.18-.63-.15-.5.13-1.03.63-1.18 4.43-1.34 9.94-.69 13.71 1.61.45.28.6.87.32 1.32zm.13-3.4C15.74 8.2 8.9 7.98 5.03 9.16c-.6.18-1.24-.16-1.42-.76-.18-.6.16-1.24.76-1.42 4.45-1.35 12-1.09 16.49 1.57.55.32.73 1.03.4 1.58-.32.54-1.03.72-1.58.4z"/></svg>
            Spotify
          </a>
          <a class="btn-stream btn-youtube" href="https://youtube.com" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.12-2.12C19.5 3.55 12 3.55 12 3.55s-7.5 0-9.38.53A3 3 0 0 0 .5 6.2C0 8.08 0 12 0 12s0 3.92.5 5.8a3 3 0 0 0 2.12 2.12c1.88.53 9.38.53 9.38.53s7.5 0 9.38-.53a3 3 0 0 0 2.12-2.12C24 15.92 24 12 24 12s0-3.92-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>
            YouTube
          </a>
        </div>
      </div>
      <div class="banner-logo">
        <img src="assets/logo.svg" alt="Xeta Music Label crest" />
      </div>
      </div>
    </section>

  <main class="wrap">

    <!-- NOW PLAYING (modern card) -->
    <section class="np">
      <h2 class="np-heading">Hit play</h2>

      <div class="np-card">
        <div class="np-cover">
          <img src="assets/album-cover.svg" alt="Album cover" />
        </div>

        <div class="np-body">
          <p class="np-eyebrow">Now playing</p>
          <h3 class="np-title">Midnight Frequency</h3>
          <p class="np-artist">Waleed DJ</p>

          <div class="np-controls">
            <button class="np-play" id="play-btn" aria-label="Play or pause">
              <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
            </button>
            <div class="np-progress">
              <span class="np-time" id="time-current">0:00</span>
              <div class="np-bar" id="progress-bar" role="slider" aria-label="Seek" tabindex="0">
                <div class="np-fill" id="progress-fill"></div>
                <div class="np-knob" id="progress-knob"></div>
              </div>
              <span class="np-time" id="time-duration">0:00</span>
            </div>
          </div>
        </div>

        <!-- Drop your file at audio/track.mp3 (or change the src below) -->
        <audio id="xeta-audio" src="audio/track.mp3" preload="metadata"></audio>
      </div>

      <div class="np-list">
        <p class="np-list-label">More tracks</p>
        <button class="np-track" data-src="audio/track-2.mp3" data-title="Neon District" data-artist="Waleed DJ">
          <span class="np-track-index">02</span>
          <span class="np-track-main">
            <span class="np-track-title">Neon District</span>
            <span class="np-track-artist">Waleed DJ</span>
          </span>
          <span class="np-track-time">4:02</span>
        </button>
        <button class="np-track" data-src="audio/track-3.mp3" data-title="Afterhours" data-artist="Nova Reign">
          <span class="np-track-index">03</span>
          <span class="np-track-main">
            <span class="np-track-title">Afterhours</span>
            <span class="np-track-artist">Nova Reign</span>
          </span>
          <span class="np-track-time">3:15</span>
        </button>
        <button class="np-track" data-src="audio/track-4.mp3" data-title="Concrete Bloom" data-artist="Sable">
          <span class="np-track-index">04</span>
          <span class="np-track-main">
            <span class="np-track-title">Concrete Bloom</span>
            <span class="np-track-artist">Sable</span>
          </span>
          <span class="np-track-time">5:21</span>
        </button>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="wrap footer-inner">
      <span class="footer-brand">XETA MUSIC LABEL</span>
      <span>&copy; 2026 Xeta Music Label. All rights reserved.</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
